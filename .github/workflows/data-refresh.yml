name: Weekly data refresh

on:
  schedule:
    # Mondays 05:30 UTC — after Friday close everywhere, before the week's puzzles matter
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write # dispatch deploy.yml after an auto-merge

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Restore pipeline cache (profiles/sparklines carry across weeks)
        uses: actions/cache/restore@v4
        with:
          path: pipeline/.cache
          key: pipeline-cache-${{ github.run_id }}
          restore-keys: pipeline-cache-
      - name: Snapshot current data for the diff
        run: cp -r public/data /tmp/old-data
      - name: Run pipeline (cold cache)
        run: npm run pipeline
      - name: Save pipeline cache (even when a later step fails — retries start warm)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pipeline/.cache
          key: pipeline-cache-${{ github.run_id }}
      - name: Refresh cap-ratio seed from this run's cache (see RUNBOOK on capless sessions)
        run: npx tsx pipeline/gen-cap-ratios.ts
      - name: Heal the daily schedule (regenerate days whose answers vanished)
        run: npx tsx puzzles/generate-daily.ts
      - name: Puzzle integrity (final gate after healing)
        run: npx tsx pipeline/check-puzzles.ts
      - name: Build diff report
        id: diff
        run: |
          {
            echo "report<<DIFF_EOF"
            npx tsx pipeline/diff-report.ts /tmp/old-data/stocks.json public/data/stocks.json /tmp/old-data/indices.json public/data/indices.json
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Open PR
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: data-refresh
          title: "Data refresh ${{ github.run_started_at }}"
          commit-message: "Weekly data refresh"
          body: ${{ steps.diff.outputs.report }}
          add-paths: |
            public/data
            puzzles
            pipeline/data/cap-ratios.json
      # Boring refreshes (no index membership changes — the one thing needing a
      # human eye, since Wikipedia edits can be wrong) merge themselves. The
      # pipeline's validate + puzzle-integrity gates already ran above. A
      # GITHUB_TOKEN merge doesn't fire deploy.yml's push trigger, so dispatch it.
      - name: Auto-merge boring refreshes
        if: >-
          (steps.pr.outputs.pull-request-operation == 'created' ||
           steps.pr.outputs.pull-request-operation == 'updated') &&
          !contains(steps.diff.outputs.report, '## Index membership changes')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge --squash "${{ steps.pr.outputs.pull-request-number }}" --repo "${{ github.repository }}"
          gh workflow run deploy.yml --ref main --repo "${{ github.repository }}"
