<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stock Guesser — deduce the mystery stock, recall index constituents, and battle market caps. A daily market-knowledge game."
    />
    <title>Stock Guesser</title>
    <link rel="preload" as="fetch" crossorigin href="%BASE_URL%data/search-index.json" />
    <link rel="preload" as="fetch" crossorigin href="%BASE_URL%data/stocks.json" />
    <link rel="preload" as="fetch" crossorigin href="%BASE_URL%data/daily-schedule.json" />
  </head>
  <body>
    <style>
      /* critical shell styles: painted before the bundle arrives */
      body {
        background: #0a0e14;
        color: #d5dde9;
        font-family: "Archivo", "Helvetica Neue", sans-serif;
        margin: 0;
      }
    </style>
    <div id="root">
      <!-- static pre-shell: replaced by React; gives instant first/largest paint -->
      <div style="max-width: 36rem; margin: 0 auto; padding: 1.5rem 1rem; text-align: center">
        <h1 style="font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em">
          Stock<span style="color: #ffb02e">Guesser</span>
        </h1>
        <p style="margin-top: 2.5rem; font-size: 1.05rem; line-height: 1.6; color: #8a94a6">
          Guess the mystery stock of the day in six tries. Five clues per guess — sector,
          industry, country, market cap, and shared index membership. Same puzzle for everyone,
          new one at midnight UTC.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
